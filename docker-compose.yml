version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/fraudshield.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=production
    volumes:
      - ./backend/app/storage:/app/storage
      - ./backend/data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - frontend
    networks:
      - fraudshield-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - fraudshield-network

networks:
  fraudshield-network:
    driver: bridge
